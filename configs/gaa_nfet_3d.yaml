# nFET single-nanosheet gate-all-around, full 3D - Id-Vg
# Runtime is dominated by the 3D direct solves (~2 s per bias point at the
# mesh below); the coarser sweep keeps the run at a few minutes.
device:
  name: gaa_nfet_3d
  structure: gaa_3d
  polarity: n
  l_gate_nm: 15.0
  t_si_nm: 5.0
  t_ox_nm: 1.0
  l_sd_nm: 15.0
  junction_lambda_nm: 1.5
  sd_doping_cm3: 1.0e20
  channel_doping_cm3: 1.0e15
  gate_workfunction_ev: 4.50
  sheet_width_nm: 20.0
  n_sheets: 1

mesh:
  nx_sd: 8
  nx_gate: 12
  ny_si: 5
  ny_ox: 2
  nz_w: 8

physics:
  mobility_model: doping_vsat

simulation:
  type: idvg
  vd: [0.05, 0.7]
  vg_start: 0.0
  vg_stop: 0.7
  vg_step: 0.05

output:
  directory: results/gaa_nfet_3d_idvg
  vtk: true
  vtk_stride: 7

extract:
  icrit_a: 1.0e-8
