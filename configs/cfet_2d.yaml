# Full CFET stack: nFET nanosheet over pFET nanosheet, common gate,
# both devices solved in one coupled Newton system.  CMOS-pair bias:
# nFET source=0 / drain=Vdd, pFET source=Vdd / drain=0; sweeping the
# common gate 0 -> Vdd turns the nFET on while the pFET turns off.
device:
  name: cfet_stack
  structure: cfet_2d
  l_gate_nm: 15.0
  t_si_nm: 5.0
  t_ox_nm: 1.0
  l_sd_nm: 15.0
  t_gap_nm: 10.0
  junction_lambda_nm: 1.5
  sd_doping_cm3: 1.0e20
  channel_doping_cm3: 1.0e15
  gate_workfunction_n_ev: 4.50
  gate_workfunction_p_ev: 4.72
  sheet_width_nm: 20.0
  n_sheets: 1

mesh:
  nx_sd: 24
  nx_gate: 40
  ny_si: 12
  ny_ox: 4

physics:
  mobility_model: doping_vsat
  quantum_model: none    # density_gradient also supported on the stack

simulation:
  type: cfet_idvg
  vdd: 0.7
  vg_start: 0.0
  vg_stop: 0.7
  vg_step: 0.025

output:
  directory: results/cfet_stack
  vtk: true
  vtk_stride: 7

extract:
  icrit_a: 1.0e-8
