# Paper-style SBC (sheet-based) CFET imported from STEP - the shipped
# sheet-based example for the CAD import pipeline (geometry:
# paper_sbc_cfet_demo.step, generated by examples/make_paper_sbc_step.py).
# Sheet-based counterpart of paper_fbc_cfet_demo_run.yaml.
#
# Two-stage workflow:
#   1. convert the CAD to a mesh (writes paper_sbc_cfet_demo.msh here):
#      GUI: right-click paper_sbc_cfet_demo.step -> Convert to mesh...
#      CLI: cfet-tcad import-step paper_sbc_cfet_demo_import.yaml \
#               -o paper_sbc_cfet_demo.msh
#   2. run this config (GUI: right-click -> Add -> Run).
#
# Physics matches configs/paper_sbc_cfet_3d.yaml (paper Fig. 2): the
# lateral_sd doping places junctions at the gate edges via l_sd/l_gate,
# which the STEP geometry aligns with along x.
device:
  name: paper_sbc_step_demo
  structure: external
  polarity: n
  l_gate_nm: 15.0
  l_sd_nm: 15.0
  junction_lambda_nm: 1.5
  sd_doping_cm3: 1.0e20
  channel_doping_cm3: 1.0e15
  gate_workfunction_ev: 4.50
  external:
    mesh_file: paper_sbc_cfet_demo.msh   # created by step 1, sits here
    dimension: 3
    regions:
      silicon_n: Silicon
      oxide_n: Oxide
      silicon_p: Silicon
      oxide_p: Oxide
    contacts:
      source_n: silicon_n
      drain_n: silicon_n
      gate_n: oxide_n
      source_p: silicon_p
      drain_p: silicon_p
      gate_p: oxide_p
    interfaces:
      si_ox_n: [silicon_n, oxide_n]
      si_ox_p: [silicon_p, oxide_p]
    silicon_polarity: {silicon_n: n, silicon_p: p}
    gate_workfunctions: {gate_n: 4.50, gate_p: 4.72}
    doping:
      silicon_n: {profile: lateral_sd}
      silicon_p: {profile: lateral_sd}

physics:
  mobility_model: doping_vsat
  mobility_scale_n: 1.0    # (100) sheet channel is the mobility reference
  mobility_scale_p: 1.0

simulation:
  type: cfet_idvg
  vdd: 0.7
  # demo sweeps the CMOS operating window [0, Vdd]: the unstructured
  # demo mesh struggles with the hole-accumulation corner at Vg < 0
  # that the paper configs' structured fine mesh powers through
  vg_start: 0.0
  vg_stop: 0.7
  vg_step: 0.05

output:
  directory: results/paper_sbc_step_demo
  vtk: true

extract:
  icrit_a: 1.0e-8
