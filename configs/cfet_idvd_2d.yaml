# CFET stack output characteristics (Id-Vd): at each fixed common-gate
# bias in simulation.vg, the drains sweep together as a CMOS pair -
# nFET drain 0 -> Vd while the pFET drain runs Vdd -> Vdd - Vd, so
# Vds_n = +Vd and Vds_p = -Vd and both devices' output curves come out
# of one coupled solve per gate bias.
device:
  name: cfet_stack_idvd
  structure: cfet_2d
  l_gate_nm: 15.0
  t_si_nm: 5.0
  t_ox_nm: 1.0
  l_sd_nm: 15.0
  t_gap_nm: 10.0
  junction_lambda_nm: 1.5
  sd_doping_cm3: 1.0e20
  channel_doping_cm3: 1.0e15
  gate_workfunction_n_ev: 4.50
  gate_workfunction_p_ev: 4.72
  sheet_width_nm: 20.0
  n_sheets: 1

mesh:
  nx_sd: 24
  nx_gate: 40
  ny_si: 12
  ny_ox: 4

physics:
  mobility_model: doping_vsat
  quantum_model: none

simulation:
  type: cfet_idvd
  vdd: 0.7
  vg: [0.3, 0.5, 0.7]   # one nFET + one pFET output curve per gate bias
  vd_start: 0.0
  vd_stop: 0.7
  vd_step: 0.025

output:
  directory: results/cfet_stack_idvd
  vtk: false            # output sweeps revisit many similar states

extract:
  icrit_a: 1.0e-8
