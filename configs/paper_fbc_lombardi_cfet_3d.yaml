# Fin-based CFET (FBC) at paper dimensions - fin approximated as a rotated GAA channel (5nm wide x 18nm tall; the paper's fin is tri-gate on bulk)
# Device parameters from: Jiang et al. (Applied Materials), "Complementary
# FET Device and Circuit Level Evaluation Using Fin-Based and Sheet-Based
# Configurations Targeting 3nm Node and Beyond" - Fig. 2 table:
#   Gate Pitch 45nm -> l_sd = (45-15)/2 ; Gate Length 15nm ; N/P Space 30nm
#   Fin Height 18nm x Fin Width 5nm (rotated cross-section)
#   Vdd 0.7V ; 2 fins per device (n_sheets: 2, parallel multiplier)
# Geometry: 2 fins per device meshed side by side at the paper's 26nm
# fin pitch (real replicas, n_sheets multiplier retired to 1).
# Assumptions not given by the paper: EOT~1nm, S/D 1e20, channel 1e15,
# gate workfunctions 4.50/4.72 eV (same for both configurations, as in
# the paper). Mobility orientation calibration via mobility_scale_n/p:
# (110)-dominated fin sidewalls: literature Si surface-orientation ratios mu_e(110)/mu_e(100)~0.75, mu_h(110)/mu_h(100)~1.40
device:
  name: paper_fbc_lombardi
  structure: cfet_3d
  l_gate_nm: 15.0
  t_si_nm: 18.0
  t_ox_nm: 1.0
  l_sd_nm: 15.0
  t_gap_nm: 30.0
  junction_lambda_nm: 1.5
  sd_doping_cm3: 1.0e20
  channel_doping_cm3: 1.0e15
  gate_workfunction_n_ev: 4.50
  gate_workfunction_p_ev: 4.72
  sheet_width_nm: 5.0
  n_sheets: 1
  n_fins: 2
  fin_pitch_nm: 26.0

mesh:
  nx_sd: 8
  nx_gate: 12
  ny_si: 8
  ny_ox: 2
  nz_w: 4

physics:
  mobility_model: lombardi_vsat
  mobility_scale_n: 0.75
  mobility_scale_p: 1.40

simulation:
  type: cfet_idvg
  vdd: 0.7
  vg_start: 0.6
  vg_stop: 0.65
  vg_step: 0.05

output:
  directory: results/paper_fbc_lombardi
  vtk: true
  vtk_stride: 1

extract:
  icrit_a: 1.0e-8
