# Full 3D CFET: two stacked gate-all-around nanosheets (nFET over pFET),
# common gate, both devices in one coupled Newton system.  ~5k nodes;
# the coarse sweep keeps the run to a few minutes.
device:
  name: cfet_3d
  structure: cfet_3d
  l_gate_nm: 15.0
  t_si_nm: 5.0
  t_ox_nm: 1.0
  l_sd_nm: 15.0
  t_gap_nm: 10.0
  junction_lambda_nm: 1.5
  sd_doping_cm3: 1.0e20
  channel_doping_cm3: 1.0e15
  gate_workfunction_n_ev: 4.50
  gate_workfunction_p_ev: 4.72
  sheet_width_nm: 20.0
  n_sheets: 1

mesh:
  nx_sd: 8
  nx_gate: 12
  ny_si: 5
  ny_ox: 2
  nz_w: 8

physics:
  mobility_model: doping_vsat

simulation:
  type: cfet_idvg
  vdd: 0.7
  vg_start: 0.0
  vg_stop: 0.7
  vg_step: 0.05

output:
  directory: results/cfet_3d
  vtk: true
  vtk_stride: 7

extract:
  icrit_a: 1.0e-8
