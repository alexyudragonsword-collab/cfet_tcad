name: Windows EXE (Nuitka)

# manual-only: trigger from Actions -> "Windows EXE (Nuitka)" -> Run
# workflow (or push a v* tag for a release build); branch pushes never
# build
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

concurrency:
  group: nuitka-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 120
    env:
      QT_QPA_PLATFORM: offscreen
      # headless Windows has no OpenGL: the VTK Qt interactor would
      # segfault, so the GUI runs with the 3D tab disabled during smokes
      CFET_TCAD_NO_3D: "1"
      NUITKA_CACHE_DIR: ${{ github.workspace }}/.nuitka-cache
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Cache Nuitka compilation
        uses: actions/cache@v4
        with:
          path: .nuitka-cache
          key: nuitka-${{ runner.os }}-py311-${{ hashFiles('pyproject.toml') }}
          restore-keys: nuitka-${{ runner.os }}-py311-

      - name: Install package, Nuitka, and MKL (DEVSIM's Windows BLAS)
        run: pip install -e ".[gui,viz,llm]" nuitka mkl

      - name: Compile standalone bundle
        run: >
          python -m nuitka packaging/entry_nuitka.py
          --standalone
          --assume-yes-for-downloads
          --enable-plugin=pyside6
          --include-package=cfet_tcad
          --include-package-data=cfet_tcad
          --include-package=devsim
          --include-package-data=devsim
          --include-package=vtkmodules
          --include-package=pyvista
          --include-package-data=pyvista
          --include-package=pyvistaqt
          --include-module=gmsh
          --python-flag=no_docstrings
          --python-flag=no_asserts
          --windows-console-mode=attach
          --windows-icon-from-ico=packaging/app.ico
          --output-filename=cfet-tcad.exe
          --output-dir=build
          --jobs=4

      - name: Bundle runtime DLLs (MKL + gmsh, installed outside packages)
        run: |
          python - <<'EOF'
          import shutil, sys
          from pathlib import Path
          dist = Path("build/entry_nuitka.dist")
          assert dist.is_dir(), dist
          (dist / "lib").mkdir(exist_ok=True)
          copied = []
          libbin = Path(sys.prefix) / "Library" / "bin"
          for pattern in ("mkl_*.dll", "libiomp5md*.dll"):
              for src in libbin.glob(pattern):
                  shutil.copy2(src, dist); copied.append(src.name)
          for src in (Path(sys.prefix) / "lib").glob("gmsh*.dll"):
              shutil.copy2(src, dist)
              shutil.copy2(src, dist / "lib")
              copied.append(src.name)
          print(f"copied {len(copied)} DLLs:", *copied[:6])
          assert any(n.startswith("mkl_rt") for n in copied), "mkl_rt missing"
          assert any(n.startswith("libiomp5md") for n in copied), "iomp missing"
          assert any(n.startswith("gmsh") for n in copied), "gmsh dll missing"
          EOF

      - name: Bundle example design configs (visible next to the exe)
        run: |
          cp -r configs build/entry_nuitka.dist/configs
          test -f build/entry_nuitka.dist/configs/cfet_3d.yaml

      - name: Frozen smoke - CLI structure export (devsim+gmsh+MKL bundled)
        run: |
          ./build/entry_nuitka.dist/cfet-tcad.exe structure build/entry_nuitka.dist/configs/nsheet_nfet_2d.yaml -o smoke_out
          test -f smoke_out/vtk/structure.vtm
          echo "frozen CLI OK"

      - name: Frozen smoke - doctor self-diagnosis
        run: |
          ./build/entry_nuitka.dist/cfet-tcad.exe doctor

      - name: Frozen smoke - tiny solve from a non-ASCII install path
        run: |
          # renaming the dist right after an exe inside it exits can hit a
          # transient Windows lock (late handle release / AV scan of the
          # fresh binaries): retry with backoff instead of failing a
          # ~50-minute build on a timing race
          mv_retry() {
            for i in 1 2 3 4 5; do
              mv "$1" "$2" 2>/dev/null && return 0
              echo "mv \"$1\" locked (attempt $i), retrying..."
              sleep $((3*i))
            done
            mv "$1" "$2"  # final attempt surfaces the real error
          }
          mv_retry build/entry_nuitka.dist "build/独立版 dist"
          cat > smoke_tiny.yaml <<'YAML'
          device: {name: smoke, polarity: n, gate_workfunction_ev: 4.5}
          mesh: {nx_sd: 6, nx_gate: 10, ny_si: 5, ny_ox: 2}
          simulation: {type: idvg, vd: [0.7], vg_start: 0.0, vg_stop: 0.2, vg_step: 0.1}
          output: {directory: smoke_solve, vtk: false}
          YAML
          "./build/独立版 dist/cfet-tcad.exe" run smoke_tiny.yaml -o smoke_solve
          test -f smoke_solve/fom.json
          mv_retry "build/独立版 dist" build/entry_nuitka.dist
          echo "frozen solve OK from non-ASCII path"

      - name: Frozen smoke - GUI boots offscreen (double-click conditions)
        run: |
          python - <<'EOF'
          import subprocess, time
          # DETACHED_PROCESS: no console, no std handles - the Explorer
          # double-click condition that used to crash devsim's import
          p = subprocess.Popen(["./build/entry_nuitka.dist/cfet-tcad.exe"],
                               creationflags=subprocess.DETACHED_PROCESS)
          time.sleep(25)
          alive = p.poll() is None
          p.kill()
          p.wait(timeout=30)  # fully gone before the next step moves the dist
          assert alive, f"GUI exited early with {p.returncode}"
          print("frozen GUI OK (stayed up, detached)")
          EOF

      - name: Repackage into a clean, PyInstaller-style layout
        run: |
          # Nuitka's standalone dist is a flat pile of DLLs/pyds with the
          # exe buried among them.  Mirror the PyInstaller onedir feel:
          # tuck the whole runtime into app/ (the "_internal" equivalent -
          # the loader still finds its DLLs, they all moved together) and
          # leave only a clearly named launcher + readme at the top.
          mkdir -p build/pkg
          # same transient-lock guard as the non-ASCII smoke: the GUI
          # smoke killed an exe from this directory moments ago
          for i in 1 2 3 4 5; do
            mv build/entry_nuitka.dist build/pkg/app 2>/dev/null && break
            echo "dist locked (attempt $i), retrying..."
            sleep $((3*i))
          done
          test -d build/pkg/app
          printf '%s\n' \
            '@echo off' \
            'start "" "%~dp0app\cfet-tcad.exe" %*' \
            > "build/pkg/Launch STACKED CMOS TCAD.bat"
          cat > "build/pkg/START HERE.txt" <<'TXT'
          STACKED CMOS TCAD - Windows build (Nuitka)

          中文:
            双击 “Launch STACKED CMOS TCAD.bat” 启动图形界面。
            也可进入 app 文件夹，双击 cfet-tcad.exe。
            命令行用法: app\cfet-tcad.exe <命令>   (run / structure / doctor 等)
            示例设计文件在 app\configs\ 目录。

          English:
            Double-click "Launch STACKED CMOS TCAD.bat" to start the GUI.
            Or open the app folder and double-click cfet-tcad.exe.
            Command line: app\cfet-tcad.exe <command>   (run / structure / doctor)
            Example designs live in app\configs\.
          TXT
          # CRLF so Windows Notepad / cmd read the files cleanly
          sed -i 's/$/\r/' "build/pkg/Launch STACKED CMOS TCAD.bat" \
                           "build/pkg/START HERE.txt"
          ls -la build/pkg
          test -f "build/pkg/app/cfet-tcad.exe"
          test -f "build/pkg/app/configs/cfet_3d.yaml"

      - name: Bundle size breakdown (diagnostic - never fails the build)
        run: |
          set +e  # this whole step is informational only
          app="build/pkg/app"
          echo "=== total ==="
          du -sh build/pkg
          echo
          echo "=== $app top-level, sorted largest first ==="
          du -sh "$app"/* 2>/dev/null | sort -rh | head -25
          echo
          echo "=== usual suspects (VTK / MKL / Qt / sci-stack / anthropic) ==="
          # Nuitka's standalone output is a flat pile - module DLLs/pyds
          # use dotted names (e.g. vtkmodules.vtkRenderingCore.pyd), so
          # match loosely rather than assume the PyInstaller-style prefix
          for pat in "*vtkmodules*" "*PySide6*" "mkl_*" "libiomp5md*" \
                    "*numpy*" "*scipy*" "*matplotlib*" "*devsim*" \
                    "*gmsh*" "*anthropic*" "*httpx*" "*httpcore*" \
                    "*pyvista*"; do
            size=$(du -sch "$app"/$pat 2>/dev/null | tail -1 | cut -f1)
            if [ -n "$size" ] && [ "$size" != "0" ]; then
              printf "%-8s %s\n" "$size" "$pat"
            fi
          done
          echo "(informational only - never fails the job)"
          exit 0
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: cfet-tcad-windows-x64-nuitka
          path: build/pkg
          compression-level: 6

      - name: Zip for release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd build/pkg && 7z a ../../cfet-tcad-windows-x64-nuitka.zip *

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: cfet-tcad-windows-x64-nuitka.zip
