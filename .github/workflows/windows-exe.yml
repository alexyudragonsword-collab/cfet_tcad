name: Windows EXE

# manual-only: trigger from Actions -> "Windows EXE" -> Run workflow
# (or push a v* tag for a release build); branch pushes never build
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

concurrency:
  group: winexe-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      QT_QPA_PLATFORM: offscreen
      # headless Windows has no OpenGL: the VTK Qt interactor would
      # segfault, so the GUI runs with the 3D tab disabled during smokes
      CFET_TCAD_NO_3D: "1"
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package, PyInstaller, and MKL (DEVSIM's Windows BLAS)
        run: pip install -e ".[dev,gui,viz]" pyinstaller mkl

      - name: Windows smoke tests (DEVSIM+MKL solve, GUI offscreen)
        run: pytest tests/test_solve_smoke.py tests/test_gui.py -q

      - name: Build standalone bundle
        run: pyinstaller packaging/cfet_tcad.spec --noconfirm

      - name: Bundle example design configs (visible next to the exe)
        run: |
          cp -r configs dist/cfet-tcad/configs
          test -f dist/cfet-tcad/configs/cfet_3d.yaml

      - name: Frozen smoke - CLI structure export (devsim+gmsh+MKL bundled)
        run: |
          ./dist/cfet-tcad/cfet-tcad.exe structure dist/cfet-tcad/configs/nsheet_nfet_2d.yaml -o smoke_out
          test -f smoke_out/vtk/structure.vtm
          echo "frozen CLI OK"

      - name: Frozen smoke - doctor self-diagnosis
        run: |
          ./dist/cfet-tcad/cfet-tcad.exe doctor

      - name: Frozen smoke - tiny solve from a non-ASCII install path
        run: |
          # regression: DEVSIM_MATH_LIBS must survive install dirs with
          # non-ASCII characters (Chinese user names), and the solve must
          # reach BLAS (mkl threading layer loads libiomp5md lazily)
          mv dist/cfet-tcad "dist/独立版 cfet-tcad"
          cat > smoke_tiny.yaml <<'YAML'
          device: {name: smoke, polarity: n, gate_workfunction_ev: 4.5}
          mesh: {nx_sd: 6, nx_gate: 10, ny_si: 5, ny_ox: 2}
          simulation: {type: idvg, vd: [0.7], vg_start: 0.0, vg_stop: 0.2, vg_step: 0.1}
          output: {directory: smoke_solve, vtk: false}
          YAML
          "./dist/独立版 cfet-tcad/cfet-tcad.exe" run smoke_tiny.yaml -o smoke_solve
          test -f smoke_solve/fom.json
          mv "dist/独立版 cfet-tcad" dist/cfet-tcad
          echo "frozen solve OK from non-ASCII path"

      - name: Frozen smoke - GUI exe boots offscreen (double-click conditions)
        run: |
          python - <<'EOF'
          import subprocess, time
          # DETACHED_PROCESS = no console and no inherited std handles,
          # exactly how Explorer launches it; sys.stdout is None inside
          # (the condition that used to crash devsim's import)
          p = subprocess.Popen(["./dist/cfet-tcad/cfet-tcad-gui.exe"],
                               creationflags=subprocess.DETACHED_PROCESS)
          time.sleep(25)
          alive = p.poll() is None
          p.kill()
          assert alive, f"GUI exe exited early with {p.returncode}"
          print("frozen GUI OK (stayed up, detached)")
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: cfet-tcad-windows-x64
          path: dist/cfet-tcad
          compression-level: 6

      - name: Zip for release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd dist && 7z a ../cfet-tcad-windows-x64.zip cfet-tcad

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: cfet-tcad-windows-x64.zip
