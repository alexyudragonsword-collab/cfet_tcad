name: Windows EXE

on:
  workflow_dispatch:
  push:
    tags: ["v*"]
    # building takes ~20 min, so branch pushes only trigger when the
    # packaging inputs themselves change
    branches: ["**"]
    paths:
      - ".github/workflows/windows-exe.yml"
      - "packaging/**"

concurrency:
  group: winexe-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      QT_QPA_PLATFORM: offscreen
      # headless Windows has no OpenGL: the VTK Qt interactor would
      # segfault, so the GUI runs with the 3D tab disabled during smokes
      CFET_TCAD_NO_3D: "1"
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package, PyInstaller, and MKL (DEVSIM's Windows BLAS)
        run: pip install -e ".[dev,gui,viz]" pyinstaller mkl

      - name: Windows smoke tests (DEVSIM+MKL solve, GUI offscreen)
        run: pytest tests/test_solve_smoke.py tests/test_gui.py -q

      - name: Build standalone bundle
        run: pyinstaller packaging/cfet_tcad.spec --noconfirm

      - name: Frozen smoke - CLI structure export (devsim+gmsh+MKL bundled)
        run: |
          ./dist/cfet-tcad/cfet-tcad.exe structure configs/nsheet_nfet_2d.yaml -o smoke_out
          test -f smoke_out/vtk/structure.vtm
          echo "frozen CLI OK"

      - name: Frozen smoke - GUI exe boots offscreen
        run: |
          python - <<'EOF'
          import subprocess, time
          p = subprocess.Popen(["./dist/cfet-tcad/cfet-tcad-gui.exe"])
          time.sleep(25)
          alive = p.poll() is None
          p.kill()
          assert alive, f"GUI exe exited early with {p.returncode}"
          print("frozen GUI OK (stayed up)")
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: cfet-tcad-windows-x64
          path: dist/cfet-tcad
          compression-level: 6

      - name: Zip for release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd dist && 7z a ../cfet-tcad-windows-x64.zip cfet-tcad

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: cfet-tcad-windows-x64.zip
